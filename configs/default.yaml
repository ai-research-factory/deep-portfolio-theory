project:
  name: deep-portfolio-theory
  paper_title: "Deep Portfolio Theory"
  factory_id: proj_8ed17ca5

data:
  source: "arf_api"
  api_base_url: "https://ai.1s.xyz/api/data/ohlcv"
  start_date: "2010-01-01"
  end_date: "2023-12-31"
  interval: "1d"
  output_dir: "data/processed"

model:
  type: "autoencoder"
  input_dim: null  # determined by number of assets
  hidden_dim: 128
  latent_dim: 32

training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  validation_split: 0.2
  seed: 42

evaluation:
  metrics: ["sharpe_ratio", "annual_return", "max_drawdown", "hit_rate"]
  walk_forward: true
  train_months: 60
  test_months: 1
  rebalance_freq: "MS"
  fee_bps: 10
  slippage_bps: 5
  returns_freq: "daily"  # "daily" or "monthly"
